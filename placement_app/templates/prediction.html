{% extends "base.html" %}

{% block title %}Placement Prediction{% endblock %}

{% block content %}

<section class="dashboard">

    <h1>📊 Placement Prediction</h1>

    <div class="card">

        <form method="POST">

            {% csrf_token %}

            <label>CGPA</label>
            <input type="number" step="0.1" name="cgpa" class="form-control" required>

            <br>

            <label>Communication Skills</label>
            <select name="communication" class="form-control">
                <option>Excellent</option>
                <option>Good</option>
                <option>Average</option>
            </select>

            <br>

            <button type="submit">
                Predict Placement
            </button>

        </form>

        {% if result %}

            <hr>

            <h3>{{ result }}</h3>

        {% endif %}

    </div>

</section>

{% endblock %}
